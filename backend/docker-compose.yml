services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: faberon
      POSTGRES_USER: faberon
      POSTGRES_PASSWORD: faberon
    ports:
      - "5432:5432"
    volumes:
      - faberon-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faberon -d faberon"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: faberon
      RABBITMQ_DEFAULT_PASS: faberon
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - faberon-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  faberon-postgres-data:
  faberon-rabbitmq-data:
